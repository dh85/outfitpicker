name: Go CI

on:
  push:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "mise.toml"
      - "Makefile"
      - ".github/workflows/go-ci.yml"
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "mise.toml"
      - "Makefile"
      - ".github/workflows/go-ci.yml"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run test suite
        run: go test ./...

      - name: Run race detector
        run: go test -race ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Enforce coverage threshold
        run: make coverage-check
